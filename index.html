<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 건설현장 안전점검 체크리스트 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20h20M4 20V10l8-6 8 6v10M9 20v-6h6v6"/>
          <path d="M9 10h6v4H9z" fill="currentColor" opacity="0.2"/>
        </svg>
      </div>
      <h1>AI 안전점검 체크리스트</h1>
      <p class="header-sub">현장 사진을 업로드하면 AI가 안전점검 항목을 생성합니다</p>
    </header>

    <!-- API Key -->
    <section class="card api-card" id="apiSection">
      <div class="card-label">API 설정</div>
      <div class="ai-selector">
        <label class="ai-chip"><input type="radio" name="aiProvider" value="gemini" checked><span>Gemini</span></label>
        <label class="ai-chip"><input type="radio" name="aiProvider" value="claude"><span>Claude</span></label>
      </div>
      <div id="apiInputRow" class="api-row">
        <input type="password" id="apiKeyInput" placeholder="Gemini API Key 입력" autocomplete="off">
        <div class="api-buttons">
          <button class="btn-icon" onclick="toggleApiKey()">👁</button>
          <button class="btn-save" id="saveApiKey" onclick="saveApiKey()">저장</button>
        </div>
      </div>
      <div id="apiSavedRow" class="api-saved" style="display:none">
        <span id="apiSavedText">API Key 저장됨 ✓</span>
        <button class="btn-change" onclick="changeApiKey()">변경</button>
      </div>
      <p class="hint">API Key는 브라우저 로컬 저장소에만 저장됩니다</p>
    </section>

    <!-- Work Type -->
    <section class="card" id="workTypeSection">
      <div class="card-label">공종 선택 (복수 선택 가능)</div>
      <div class="work-type-category">공종</div>
      <div class="work-type-grid" id="workTypeGrid">
        <label class="work-type-chip"><input type="checkbox" value="토공 굴착 작업"><span>토공 굴착</span></label>
        <label class="work-type-chip"><input type="checkbox" value="배수로 설치 작업"><span>배수로 설치</span></label>
        <label class="work-type-chip"><input type="checkbox" value="준설 작업"><span>준설 작업</span></label>
        <label class="work-type-chip"><input type="checkbox" value="구조물 설치 작업"><span>구조물 설치</span></label>
        <label class="work-type-chip"><input type="checkbox" value="가시설 설치 작업"><span>가시설 설치</span></label>
        <label class="work-type-chip"><input type="checkbox" value="비계 작업"><span>비계 작업</span></label>
        <label class="work-type-chip"><input type="checkbox" value="거푸집"><span>거푸집</span></label>
        <label class="work-type-chip"><input type="checkbox" value="동바리"><span>동바리</span></label>
        <label class="work-type-chip"><input type="checkbox" value="콘크리트 타설"><span>콘크리트 타설</span></label>
        <label class="work-type-chip"><input type="checkbox" value="철근 작업"><span>철근 작업</span></label>
        <label class="work-type-chip"><input type="checkbox" value="도로·포장 공사"><span>도로·포장</span></label>
        <label class="work-type-chip"><input type="checkbox" value="전기 작업"><span>전기 작업</span></label>
        <label class="work-type-chip"><input type="checkbox" value="밀폐공간 작업"><span>밀폐공간</span></label>
        <label class="work-type-chip"><input type="checkbox" value="고소작업"><span>고소작업</span></label>
        <label class="work-type-chip"><input type="checkbox" value="용접·화기 작업"><span>용접·화기</span></label>
        <label class="work-type-chip"><input type="checkbox" value="자재 상하차 작업"><span>자재 상하차</span></label>
      </div>
      <div class="work-type-category">중장비 작업</div>
      <div class="work-type-grid" id="workTypeGridEquip">
        <label class="work-type-chip"><input type="checkbox" value="굴착기 작업"><span>굴착기</span></label>
        <label class="work-type-chip"><input type="checkbox" value="콘크리트 펌프카 작업"><span>펌프카</span></label>
        <label class="work-type-chip"><input type="checkbox" value="덤프트럭 작업"><span>덤프트럭</span></label>
        <label class="work-type-chip"><input type="checkbox" value="로더 작업"><span>로더</span></label>
        <label class="work-type-chip"><input type="checkbox" value="크레인 작업"><span>크레인</span></label>
      </div>
      <p class="hint">선택하지 않으면 사진만으로 분석합니다</p>
    </section>

    <!-- Upload -->
    <section class="card" id="uploadSection">
      <div class="card-label">현장 사진 <span id="photoCount" style="color:var(--text2);font-weight:500;text-transform:none;">(0/5)</span></div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>터치하여 사진 촬영 또는 선택 (최대 5장)</span>
        </div>
      </div>
      <div class="thumb-grid" id="thumbGrid"></div>
    </section>

    <!-- Analyze Button -->
    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()" disabled>
      <span id="analyzeBtnText">AI 분석 시작</span>
      <div id="analyzeSpinner" class="spinner" style="display:none"></div>
    </button>

    <!-- Result -->
    <section class="card result-card" id="resultSection" style="display:none">
      <div class="result-header">
        <div class="card-label">안전점검 체크리스트</div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <div id="checklistArea"></div>
      <button class="btn-download" id="downloadBtn" onclick="downloadPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        PDF 다운로드
      </button>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
