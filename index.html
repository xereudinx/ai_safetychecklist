<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AI 건설현장 안전점검 체크리스트 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20h20M4 20V10l8-6 8 6v10M9 20v-6h6v6"/>
          <path d="M9 10h6v4H9z" fill="currentColor" opacity="0.2"/>
        </svg>
      </div>
      <h1>AI 안전점검 체크리스트</h1>
      <p class="header-sub">현장 사진을 업로드하면 AI가 안전점검 항목을 생성합니다</p>
    </header>

    <!-- API Key -->
    <section class="card api-card" id="apiSection">
      <div class="card-label">API 설정</div>
      <div class="api-row">
        <input type="password" id="apiKeyInput" placeholder="Anthropic API Key 입력" autocomplete="off">
        <button id="apiToggle" class="btn-icon" onclick="toggleApiKey()">👁</button>
      </div>
      <p class="hint">API Key는 서버로 전송되지 않으며 브라우저에서만 사용됩니다</p>
    </section>

    <!-- Upload -->
    <section class="card" id="uploadSection">
      <div class="card-label">현장 사진</div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="upload-placeholder" id="uploadPlaceholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>터치하여 사진 촬영 또는 선택</span>
        </div>
        <img id="preview" class="preview-img" style="display:none">
      </div>
      <div class="file-info" id="fileInfo" style="display:none"></div>
    </section>

    <!-- Analyze Button -->
    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()" disabled>
      <span id="analyzeBtnText">AI 분석 시작</span>
      <div id="analyzeSpinner" class="spinner" style="display:none"></div>
    </button>

    <!-- Result -->
    <section class="card result-card" id="resultSection" style="display:none">
      <div class="result-header">
        <div class="card-label">안전점검 체크리스트</div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <div id="checklistArea"></div>
      <button class="btn-download" id="downloadBtn" onclick="downloadPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        PDF 다운로드
      </button>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
